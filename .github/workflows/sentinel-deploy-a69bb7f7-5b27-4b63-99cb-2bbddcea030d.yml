name: Deploy Content to sentinel-test-01 [a69bb7f7-5b27-4b63-99cb-2bbddcea030d]

on:
  push:
    branches: [ main ]
    paths:
    - 'AnalyticRules/**'
    - '!.github/workflows/**'  # this filter prevents other workflow changes from triggering this workflow
    - '.github/workflows/sentinel-deploy-a69bb7f7-5b27-4b63-99cb-2bbddcea030d.yml'

jobs:
  deploy-content:
    runs-on: windows-latest
    env:
      resourceGroupName: 'rg-sentinel-test'
      workspaceName: 'sentinel-test-01'
      workspaceId: '41f155b3-16e0-4114-b56a-64ec1b44c582'
      directory: '${{ github.workspace }}/AnalyticRules'
      cloudEnv: 'AzureCloud'
      contentTypes: 'AnalyticsRule'
      branch: 'main'
      sourceControlId: 'a69bb7f7-5b27-4b63-99cb-2bbddcea030d'
      rootDirectory: '${{ github.workspace }}'
      githubAuthToken: ${{ secrets.GITHUB_TOKEN }}
      smartDeployment: 'false'
    permissions:
      contents: write
      id-token: write # Require write permission to Fetch an OIDC token.

    steps:
    - name: Login to Azure (Attempt 1)
      continue-on-error: true
      id: login1
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_SENTINEL_CLIENTID_a69bb7f75b274b6399cb2bbddcea030d }}
        tenant-id: ${{ secrets.AZURE_SENTINEL_TENANTID_a69bb7f75b274b6399cb2bbddcea030d }}
        subscription-id: ${{ secrets.AZURE_SENTINEL_SUBSCRIPTIONID_a69bb7f75b274b6399cb2bbddcea030d }}
        environment: 'AzureCloud'
        audience: api://AzureADTokenExchange
        enable-AzPSSession: true

    - name: Wait 30 seconds if login attempt 1 failed
      if: ${{ steps.login1.outcome=='failure' }}
      run: powershell Start-Sleep -s 30

    - name: Login to Azure (Attempt 2)
      continue-on-error: true
      id: login2
      uses: azure/login@v2
      if: ${{ steps.login1.outcome=='failure' }}
      with:
        client-id: ${{ secrets.AZURE_SENTINEL_CLIENTID_a69bb7f75b274b6399cb2bbddcea030d }}
        tenant-id: ${{ secrets.AZURE_SENTINEL_TENANTID_a69bb7f75b274b6399cb2bbddcea030d }}
        subscription-id: ${{ secrets.AZURE_SENTINEL_SUBSCRIPTIONID_a69bb7f75b274b6399cb2bbddcea030d }}
        environment: 'AzureCloud'
        audience: api://AzureADTokenExchange
        enable-AzPSSession: true

    - name: Wait 30 seconds if login attempt 2 failed
      if: ${{ steps.login2.outcome=='failure' }}
      run: powershell Start-Sleep -s 30

    - name: Login to Azure (Attempt 3)
      continue-on-error: false
      id: login3
      uses: azure/login@v2
      if: ${{ steps.login2.outcome=='failure'  }}
      with:
        client-id: ${{ secrets.AZURE_SENTINEL_CLIENTID_a69bb7f75b274b6399cb2bbddcea030d }}
        tenant-id: ${{ secrets.AZURE_SENTINEL_TENANTID_a69bb7f75b274b6399cb2bbddcea030d }}
        subscription-id: ${{ secrets.AZURE_SENTINEL_SUBSCRIPTIONID_a69bb7f75b274b6399cb2bbddcea030d }}
        environment: 'AzureCloud'
        audience: api://AzureADTokenExchange
        enable-AzPSSession: true

    - name: Checkout
      uses: actions/checkout@v3

    - name: Install Bicep CLI
      shell: pwsh
      run: az bicep install --force

    - name: Deploy Content to Microsoft Sentinel
      uses: azure/powershell@v2
      with:
        azPSVersion: 'latest'
        inlineScript: |
          ${{ github.workspace }}//.github/workflows/azure-sentinel-deploy-a69bb7f7-5b27-4b63-99cb-2bbddcea030d.ps1